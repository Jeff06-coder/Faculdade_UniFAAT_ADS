version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: auladb
      MYSQL_USER: admin123
      MYSQL_PASSWORD: admin123
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: